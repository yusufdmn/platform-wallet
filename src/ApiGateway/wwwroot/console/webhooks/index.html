<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Platform Wallet — Failed Webhooks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 1200px; }
        header { border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; }
        .controls { display: flex; gap: 0.5rem; margin-top: 1rem; align-items: center; flex-wrap: wrap; }
        .controls label { display: flex; flex-direction: column; font-size: 0.85rem; }
        .controls input { width: 7rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #e3e3e3; padding: 0.3rem 0.5rem; text-align: left; font-size: 0.9rem; }
        button { cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .banner   { padding: 0.5rem; background: #fde68a; border: 1px solid #f59e0b; margin-bottom: 1rem; }
        .progress { padding: 0.5rem; background: #dbeafe; border: 1px solid #3b82f6; margin-top: 1rem; }
        .empty    { color: #666; margin-top: 1rem; }
        code      { font-size: 0.85rem; }
    </style>
</head>
<body>
<header>
    <h1>Failed Webhooks</h1>
    <p><a href="../">← Ops Console</a></p>
</header>
<div id="banner"   class="banner"   hidden></div>
<div id="progress" class="progress" hidden></div>
<div class="controls">
    <label>Status
        <select id="status-filter">
            <option value="Failed" selected>Failed</option>
            <option value="Retrying">Retrying</option>
            <option value="Delivered">Delivered</option>
            <option value="All">All</option>
        </select>
    </label>
    <label>Interval (ms)
        <input id="interval-ms" type="number" min="100" max="60000" value="1000" />
    </label>
    <label>Max
        <input id="max-count" type="number" min="1" max="500" value="500" />
    </label>
    <button id="refresh">Refresh</button>
    <button id="replay-all">Replay all (failed)</button>
</div>
<div id="rows">Loading…</div>
<script src="../auth.js" defer></script>
<script src="webhooks.js" defer></script>
</body>
</html>
