<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Platform Wallet — Sagas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="../console.css" />
</head>
<body>
<div class="app-shell">
    <header class="app-bar">
        <div class="app-bar-inner">
            <a class="brand" href="../">
                <span class="brand-mark">PW</span>
                <span class="brand-title">Platform Wallet<span class="brand-sub">Ops Console</span></span>
            </a>
            <nav class="app-nav">
                <a href="../">Overview</a>
                <a href="./" class="active">Sagas</a>
                <a href="../dlq/">DLQ</a>
                <a href="../webhooks/">Webhooks</a>
            </nav>
            <span class="app-spacer"></span>
            <span class="app-bar-meta"><span class="status-dot"></span>PKCE session</span>
        </div>
    </header>

    <main class="page">
        <p class="breadcrumb"><a href="../">Ops Console</a> <span class="sep">/</span> Sagas</p>
        <div class="page-header">
            <div>
                <h1 class="page-title">Sagas</h1>
                <p class="page-subtitle">Inspect transaction saga state and replay stranded voids.</p>
            </div>
        </div>

        <div id="banner" class="banner" hidden></div>

        <div class="controls">
            <label>State
                <select id="state-filter">
                    <option value="">All</option>
                    <option value="Submitted">Submitted</option>
                    <option value="Processing">Processing</option>
                    <option value="Held">Held</option>
                    <option value="Completed">Completed</option>
                    <option value="Failed">Failed</option>
                    <option value="VoidStranded">VoidStranded</option>
                </select>
            </label>
            <span class="spacer"></span>
            <button id="refresh" class="ghost">Refresh</button>
            <button id="prev">← Prev</button>
            <button id="next">Next →</button>
            <span id="page-info"></span>
        </div>

        <div class="surface">
            <div id="rows" class="table-wrap">Loading…</div>
        </div>
    </main>
</div>
<script src="../auth.js" defer></script>
<script src="sagas.js" defer></script>
</body>
</html>
