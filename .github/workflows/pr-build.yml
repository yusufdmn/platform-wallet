name: PR Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PlatformWallet.sln

      - name: Build
        run: dotnet build PlatformWallet.sln --no-restore --configuration Release

      - name: Unit tests
        run: |
          dotnet test tests/Ledger.UnitTests/Ledger.UnitTests.csproj --no-build --configuration Release
          dotnet test tests/ArchitectureTests/ArchitectureTests.csproj --no-build --configuration Release
