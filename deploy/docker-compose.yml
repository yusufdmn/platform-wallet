name: platform-wallet

# Application services only. Infrastructure (Postgres, RabbitMQ, Redis, Keycloak,
# OTel, Jaeger, Seq, Prometheus, Grafana) runs on the LAN server via
# docker-compose.infra.yml.
#
# All credentials and host addresses come from the root .env file via ${VAR}.
# Service-to-service URLs within this stack use Docker container names — these
# are deployment topology, not user configuration, so they are set directly in
# this file rather than forwarded from .env.
#
# Usage (from repo root):
#   docker compose -f deploy/docker-compose.yml --env-file .env up --build -d

services:

  ledger:
    build:
      context: ..
      dockerfile: src/Ledger/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ledger_db
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: ledger
    ports:
      - "14038:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  transaction-intake:
    build:
      context: ..
      dockerfile: src/TransactionIntake/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: intake_db
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: transaction-intake
    ports:
      - "14040:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  saga-orchestrator:
    build:
      context: ..
      dockerfile: src/SagaOrchestrator/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: saga_db
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
      # Zero-trust: the /admin/sagas endpoints re-validate the JWT against Keycloak.
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: saga-orchestrator

  balance-query:
    build:
      context: ..
      dockerfile: src/BalanceQuery/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      # BalanceQuery consumes Transaction* events over RabbitMQ for cache invalidation.
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
      # BalanceQuery reads REDIS_CONNECTION (StackExchange.Redis format).
      # In this stack the Redis container is on the LAN server — use the .env value.
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      # gRPC to Ledger: port 9090 is the h2c-only gRPC port (8080 is HTTP/1.1 REST).
      LEDGER_GRPC_URL: http://ledger:9090
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: balance-query
    ports:
      - "14039:8080"
    depends_on:
      ledger: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  webhook-dispatcher:
    build:
      context: ..
      dockerfile: src/WebhookDispatcher/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: webhook_db
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
      # Zero-trust: the /admin/webhooks endpoints re-validate the JWT against Keycloak.
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      # Webhook delivery target: override .env's localhost value with the Docker service name.
      WEBHOOK_TARGET_URL: http://webhook-sink:8080/webhook
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: webhook-dispatcher
    depends_on:
      webhook-sink: { condition: service_healthy }

  webhook-sink:
    build:
      context: ./webhook-sink
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "9999:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: ..
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "14041:8080"             # public data plane
      - "127.0.0.1:14044:8081"   # admin/console — host-loopback only (reach via SSH tunnel/VPN)
    environment:
      ASPNETCORE_URLS: http://+:8080;http://+:8081
      KEYCLOAK_AUTHORITY: ${KEYCLOAK_AUTHORITY}
      # RabbitMQ Management API — required by the DLQ admin client (gateway throws without it).
      RABBITMQ_MGMT_URL: ${RABBITMQ_MGMT_URL}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      # ApiGateway reads REDIS_CONNECTION (StackExchange.Redis format).
      REDIS_CONNECTION: ${REDIS_CONNECTION}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: api-gateway
      # YARP cluster destinations: override .env's localhost values with Docker service names.
      ReverseProxy__Clusters__intake__Destinations__d1__Address: http://transaction-intake:8080/
      ReverseProxy__Clusters__balance__Destinations__d1__Address: http://balance-query:8080/
      ReverseProxy__Clusters__ledger-admin__Destinations__d1__Address: http://ledger:8080/
      ReverseProxy__Clusters__saga-admin__Destinations__d1__Address: http://saga-orchestrator:8080/
    depends_on:
      transaction-intake: { condition: service_healthy }
      balance-query:      { condition: service_healthy }
      ledger:             { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
