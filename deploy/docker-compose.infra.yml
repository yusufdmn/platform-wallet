name: platform-wallet-infra

# Runs on the LAN server. Contains only infrastructure — no .NET service containers.
# .NET services run as `dotnet run` on the dev machine during development and are
# containerized only at the final milestone (see TheMainPlan.md §6.2).
#
# Usage (from repo root on the server):
#   docker compose -f deploy/docker-compose.infra.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    build:
      context: ./rabbitmq
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    # start-dev: no HTTPS enforcement, hostname derived from request URL (no KC_HOSTNAME needed).
    # The token issuer will be whatever URL Keycloak is accessed from, so KEYCLOAK_AUTHORITY in
    # .env must match the URL clients use to reach this container (e.g. http://<server-ip>:8088).
    #
    # Entrypoint: substitutes ${OPS_ADMIN_PASSWORD} and ${KEYCLOAK_CLIENT_SECRET} from env
    # into the realm template, then runs `kc.sh import --override true` so realm-export.json
    # changes (e.g. new redirect URIs) overwrite the persisted realm on every restart.
    # `start-dev --import-realm` alone would skip-if-exists and keep stale config.
    entrypoint:
      - /bin/sh
      - -c
      - "mkdir -p /opt/keycloak/data/import && sed -e 's|$${OPS_ADMIN_PASSWORD}|'\"$$OPS_ADMIN_PASSWORD\"'|g' -e 's|$${KEYCLOAK_CLIENT_SECRET}|'\"$$KEYCLOAK_CLIENT_SECRET\"'|g' /tmp/realm-export.json.tpl > /opt/keycloak/data/import/realm-export.json && /opt/keycloak/bin/kc.sh import --dir /opt/keycloak/data/import --override true && exec /opt/keycloak/bin/kc.sh start-dev"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      OPS_ADMIN_PASSWORD: ${OPS_ADMIN_PASSWORD}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak/realm-export.json:/tmp/realm-export.json.tpl:ro
      - kc_data:/opt/keycloak/data
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otelcol/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC  — services send traces/metrics/logs here
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger
      - seq
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14317:4317"   # OTLP gRPC (direct, bypasses collector — useful for debugging)
    restart: unless-stopped

  seq:
    image: datalust/seq:2024
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"   # Seq UI + OTLP HTTP ingest at /ingest/otlp
    volumes:
      - seq_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  pg_data:
  seq_data:
  kc_data:
  grafana_data:
